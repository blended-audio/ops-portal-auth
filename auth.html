<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Blended Audio - Sign in</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    :root {
      --bg: #181613;
      --surface: #1F1C18;
      --border: #312B24;
      --text: #ECE7DF;
      --text-secondary: #A79B8A;
      --text-muted: #7A6F60;
      --accent: #E0A76F;
      --accent-bright: #F2B680;
      --accent-dark: #3B2A1A;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background:
        radial-gradient(ellipse 80% 60% at 50% 0%, rgba(242, 182, 128, 0.13) 0%, transparent 70%),
        var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
      box-sizing: border-box;
      color: var(--text);
    }

    .card {
      width: 100%;
      max-width: 420px;
      background: linear-gradient(180deg, rgba(31, 28, 24, 0.98) 0%, rgba(24, 22, 19, 0.98) 100%);
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: 0 24px 60px rgba(0,0,0,.45);
      text-align: center;
      padding: 30px 28px 24px;
    }

    .logo {
      display: block;
      width: min(260px, 100%);
      margin: 0 auto 18px;
      height: auto;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 20px;
      line-height: 1.2;
      color: var(--text);
    }

    p {
      margin: 0 0 18px;
      font-size: 14px;
      color: var(--text-secondary);
      line-height: 1.55;
    }

    #googleBtn {
      margin-top: 20px;
      display: flex;
      justify-content: center;
      min-height: 44px;
    }

    .status {
      margin-top: 15px;
      font-size: 13px;
      color: var(--text-muted);
      min-height: 18px;
    }
  </style>
</head>

    <h1>Sign in with Google</h1>
    <p>Use your registered Google account.</p>

    <div id="googleBtn"></div>
    <div id="status" class="status"></div>
  </div>

  <script>
    const GOOGLE_CLIENT_ID = '451236465638-415dgnkapcirh2pcapcsi5fjsl4qupi6.apps.googleusercontent.com';
    const MESSAGE_TYPE = 'ba_ops_google_credential';
    const params = new URLSearchParams(window.location.search);
    const nonce = params.get('nonce') || '';
    const parentOrigin = params.get('parentOrigin') || '*';

    function setStatus(msg) {
      document.getElementById('status').innerText = msg || '';
    }

    function postToOpener(payload) {
      if (!window.opener) {
        setStatus('No parent portal window found.');
        return;
      }
      window.opener.postMessage(payload, parentOrigin || '*');
    }

    function handleCredentialResponse(response) {
      if (!response || !response.credential) {
        setStatus('No credential returned.');
        return;
      }

      postToOpener({
        type: MESSAGE_TYPE,
        nonce: nonce,
        credential: response.credential
      });

      window.close();
    }

    function initGoogle() {
      if (!window.google || !google.accounts || !google.accounts.id) {
        setStatus('Google failed to load.');
        return;
      }

      google.accounts.id.initialize({
        client_id: GOOGLE_CLIENT_ID,
        callback: handleCredentialResponse,
        auto_select: true
      });

      google.accounts.id.renderButton(
        document.getElementById('googleBtn'),
        {
          theme: 'outline',
          size: 'large',
          text: 'signin_with',
          shape: 'rectangular',
          width: 300
        }
      );

      try {
        google.accounts.id.prompt();
      } catch (e) {
        console.log('Prompt fallback to button only.');
      }
    }

    function waitForGoogle() {
      let tries = 0;
      const interval = setInterval(() => {
        if (window.google && google.accounts && google.accounts.id) {
          clearInterval(interval);
          initGoogle();
          return;
        }

        if (++tries > 100) {
          clearInterval(interval);
          setStatus('Google script failed to load.');
        }
      }, 100);
    }

    window.onload = waitForGoogle;
  </script>
</body>
