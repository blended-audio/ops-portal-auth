<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blended Audio - Sign in</title>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    :root{color-scheme:light only}
    *{box-sizing:border-box}
    body{margin:0;font-family:Arial,sans-serif;background:#f7f2ea;color:#2f2a24;display:flex;min-height:100vh;align-items:center;justify-content:center;padding:24px}
    .card{width:100%;max-width:420px;background:#fff;border-radius:18px;box-shadow:0 18px 40px rgba(0,0,0,.14);padding:28px}
    .badge{display:inline-flex;align-items:center;gap:8px;background:#f3e7d7;color:#7a5c2d;border-radius:999px;padding:8px 12px;font-size:12px;font-weight:700;margin-bottom:14px}
    h1{margin:0 0 8px;font-size:24px;line-height:1.2}
    p{margin:0 0 18px;color:#6b5f53;font-size:14px;line-height:1.5}
    #googleBtn{display:flex;justify-content:center;margin:18px 0}
    .note{font-size:12px;color:#8a7d70;margin-top:10px;text-align:center}
    .status{display:none;margin:14px 0 0;padding:12px 14px;border-radius:12px;font-size:13px;line-height:1.45}
    .status.show{display:block}
    .status.info{background:#eef4ff;color:#244a87}
    .status.error{background:#fff0ef;color:#9c2f24}
    .actions{margin-top:18px;display:flex;justify-content:center}
    button.link{border:none;background:none;color:#7a5c2d;font-weight:700;cursor:pointer}
  </style>
</head>
<body>
  <div class="card">
    <div class="badge">Blended Audio</div>
    <h1>Sign in with Google</h1>
    <p>Use your registered Google account. If Google already knows who you are on this browser, sign-in is usually just one quick click.</p>
    <div id="googleBtn"></div>
    <div id="status" class="status info"></div>
    <div class="note">Only accounts listed in the OPS Portal sheets will be allowed through.</div>
    <div class="actions"><button class="link" onclick="window.close()">Cancel</button></div>
  </div>

  <script>
    const GOOGLE_CLIENT_ID = '451236465638-415dgnkapcirh2pcapcsi5fjsl4qupi6.apps.googleusercontent.com';
    const MESSAGE_TYPE = 'ba_ops_google_credential';
    const params = new URLSearchParams(window.location.search);
    const nonce = params.get('nonce') || '';

    function setStatus(msg, kind) {
      const el = document.getElementById('status');
      if (!msg) {
        el.textContent = '';
        el.className = 'status info';
        return;
      }
      el.textContent = msg;
      el.className = 'status show ' + (kind || 'info');
    }

    function postToOpener(payload) {
      if (!window.opener) {
        setStatus('This sign-in window was opened without a parent portal window.', 'error');
        return;
      }
      window.opener.postMessage(payload, '*');
    }

    function handleCredentialResponse(response) {
      if (!response || !response.credential) {
        setStatus('Google sign-in did not return a credential token.', 'error');
        postToOpener({ type: MESSAGE_TYPE, nonce, error: 'Google sign-in did not return a credential token.' });
        return;
      }
      setStatus('Google sign-in succeeded. Returning to the portal...', 'info');
      postToOpener({ type: MESSAGE_TYPE, nonce, credential: response.credential });
      setTimeout(function() { window.close(); }, 250);
    }

    function onGoogleReady() {
      google.accounts.id.initialize({
        client_id: GOOGLE_CLIENT_ID,
        callback: handleCredentialResponse,
        auto_select: true,
        cancel_on_tap_outside: true,
        use_fedcm_for_button: true,
        button_auto_select: true
      });

      google.accounts.id.renderButton(document.getElementById('googleBtn'), {
        type: 'standard',
        theme: 'outline',
        size: 'large',
        text: 'signin_with',
        shape: 'rectangular',
        width: 320
      });

      try {
        google.accounts.id.prompt(function(notification) {
          if (notification && notification.isNotDisplayed && notification.isNotDisplayed()) {
            setStatus('Google did not auto-open a chooser here, so use the button below.', 'info');
          }
        });
      } catch (err) {
        setStatus('Use the button below to continue.', 'info');
      }
    }

    function waitForGoogle() {
      let tries = 0;
      const timer = setInterval(function() {
        tries += 1;
        if (window.google && google.accounts && google.accounts.id) {
          clearInterval(timer);
          onGoogleReady();
          return;
        }
        if (tries > 100) {
          clearInterval(timer);
          setStatus('Google sign-in library did not load. Refresh this popup and try again.', 'error');
          postToOpener({ type: MESSAGE_TYPE, nonce, error: 'Google sign-in library did not load.' });
        }
      }, 100);
    }

    window.addEventListener('load', waitForGoogle);
  </script>
</body>
</html>
