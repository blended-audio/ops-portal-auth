<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Blended Audio - Sign in</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f7f2ea;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .card {
      background: #fff;
      padding: 28px;
      border-radius: 18px;
      box-shadow: 0 18px 40px rgba(0,0,0,.14);
      text-align: center;
      width: 360px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 22px;
    }

    p {
      font-size: 14px;
      color: #6b5f53;
    }

    #googleBtn {
      margin-top: 20px;
      display: flex;
      justify-content: center;
    }

    .status {
      margin-top: 15px;
      font-size: 13px;
      color: #555;
    }
  </style>
</head>

<body>

  <div class="card">
    <h1>Sign in with Google</h1>
    <p>Use your registered Google account</p>

    <div id="googleBtn"></div>
    <div id="status" class="status"></div>
  </div>

  <script>
    const GOOGLE_CLIENT_ID = '451236465638-415dgnkapcirh2pcapcsi5fjsl4qupi6.apps.googleusercontent.com';

    function setStatus(msg) {
      document.getElementById('status').innerText = msg || '';
    }

    function handleCredentialResponse(response) {
      if (!response || !response.credential) {
        setStatus('No credential returned.');
        return;
      }

      if (window.opener) {
        window.opener.postMessage({
          credential: response.credential
        }, '*');
      }

      window.close();
    }

    function initGoogle() {
      if (!window.google || !google.accounts || !google.accounts.id) {
        setStatus('Google failed to load.');
        return;
      }

      google.accounts.id.initialize({
        client_id: GOOGLE_CLIENT_ID,
        callback: handleCredentialResponse,
        auto_select: true
      });

      // 🔥 ALWAYS render button (prevents blank screen)
      google.accounts.id.renderButton(
        document.getElementById('googleBtn'),
        {
          theme: 'outline',
          size: 'large',
          width: 280
        }
      );

      // Try auto sign-in
      try {
        google.accounts.id.prompt();
      } catch (e) {
        console.log('Prompt failed, fallback to button');
      }
    }

    function waitForGoogle() {
      let tries = 0;

      const interval = setInterval(() => {
        if (window.google && google.accounts && google.accounts.id) {
          clearInterval(interval);
          initGoogle();
          return;
        }

        if (++tries > 50) {
          clearInterval(interval);
          setStatus('Google script failed to load.');
        }
      }, 100);
    }

    window.onload = waitForGoogle;
  </script>

</body>
</html>
